name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example v0.1.0)
        required: true
        type: string
      name:
        description: Release title
        required: false
        type: string
      prerelease:
        description: Mark as prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run compile

      - name: Test
        run: npm test

      - name: Package extension
        run: npm run package

      - name: Resolve VSIX file
        id: vsix
        shell: bash
        run: |
          set -euo pipefail
          vsix_file=$(ls -1 *.vsix | head -n 1)
          if [[ -z "${vsix_file}" ]]; then
            echo "No VSIX file found in workspace root"
            exit 1
          fi
          echo "file=${vsix_file}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload VSIX
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          NAME: ${{ inputs.name }}
          PRERELEASE: ${{ inputs.prerelease }}
          VSIX_FILE: ${{ steps.vsix.outputs.file }}
        shell: bash
        run: |
          set -euo pipefail
          title="${NAME:-$TAG}"
          args=("$TAG" "$VSIX_FILE" --title "$title" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
